services:
  - type: web
    name: sgcot-backend
    env: node
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /api/status
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 6h
      - key: CORS_ORIGIN
        sync: false
      - key: DB_SSL_REJECT_UNAUTHORIZED
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: sgcot-db
          property: connectionString
databases:
  - name: sgcot-db
    databaseName: sgcot_db
    plan: free
